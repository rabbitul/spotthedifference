<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary SEO -->
    <title>Spot the Difference Games – Free Online Puzzles for All Ages</title>
    <meta name="description" content="Play free spot the difference games online! Find hidden differences in sports, nature, space, anime and more. Fun brain puzzles for kids and adults. No download needed." />
    <meta name="keywords" content="spot the difference, spot the difference games, find the difference, spot the difference online, spot the difference free, picture puzzle games, brain games, hidden differences" />
    <link rel="canonical" href="https://spotthedifference.games/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Spot the Difference Games – Free Online Puzzles" />
    <meta property="og:description" content="Play free spot the difference games online! Sports, nature, space, anime and more categories. Fun for all ages." />
    <meta property="og:url" content="https://spotthedifference.games/" />
    <meta property="og:site_name" content="Spot the Difference" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spot the Difference Games – Free Online Puzzles" />
    <meta name="twitter:description" content="Play free spot the difference games online! Sports, nature, space, anime and more." />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Spot the Difference",
      "url": "https://spotthedifference.games/",
      "description": "Free online spot the difference games for all ages. Find hidden differences in sports, nature, space, anime and fantasy scenes.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://spotthedifference.games/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Game -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "Spot the Difference",
      "description": "A free online spot the difference puzzle game. Compare two images and find all hidden differences. Categories include sports, nature, space, anime and fantasy.",
      "url": "https://spotthedifference.games/",
      "genre": ["Puzzle", "Brain Game", "Educational"],
      "audience": {
        "@type": "Audience",
        "audienceType": "All ages"
      },
      "inLanguage": "en",
      "isAccessibleForFree": true,
      "applicationCategory": "Game",
      "operatingSystem": "Any"
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do you play spot the difference?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You are shown two nearly identical images side by side. Your goal is to click on the differences you notice between the two pictures. Each level has 5 differences to find within the time limit."
          }
        },
        {
          "@type": "Question",
          "name": "Are these spot the difference games free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, all spot the difference games on this site are completely free to play with no download or registration required."
          }
        },
        {
          "@type": "Question",
          "name": "How many differences are in each puzzle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each puzzle has exactly 5 differences to find. You have 3 minutes to find them all, and can use up to 3 hints per level."
          }
        },
        {
          "@type": "Question",
          "name": "What categories of spot the difference games are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We have spot the difference games in multiple categories: Sports (soccer, basketball, tennis), Nature (enchanted forest), Space (space station), and more categories being added regularly."
          }
        },
        {
          "@type": "Question",
          "name": "Can I play spot the difference on mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Our spot the difference games are fully optimized for mobile phones and tablets. Just tap on the differences you find in either image."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
